<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Creative Gallery</title>
  <script src="./tableau.extensions.1.latest.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 12px;
      color: #1a1a1a;
      background: #fff;
      height: 100vh;
      overflow: hidden;
    }
    #app { display: flex; flex-direction: column; height: 100vh; }

    .header {
      background: #1e6eb5;
      color: #fff;
      padding: 8px 12px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .header h1 { font-size: 12px; font-weight: 700; letter-spacing: .2px; }
    .header .status { font-size: 10px; opacity: .85; }
    .header .actions { display: flex; gap: 6px; }
    .header button {
      background: rgba(255,255,255,.15);
      color: #fff;
      border: 1px solid rgba(255,255,255,.4);
      border-radius: 4px;
      padding: 4px 9px;
      font-size: 11px;
      cursor: pointer;
    }
    .header button:hover { background: rgba(255,255,255,.28); }
    .header button:disabled { opacity: .4; cursor: default; }

    .content { flex: 1; overflow: auto; position: relative; }

    /* Card grid layout */
    .gallery {
      display: grid;
      grid-template-columns: repeat(var(--cols, 4), 1fr);
      gap: 8px;
      padding: 8px;
    }
    .tile {
      cursor: pointer;
      border: 2px solid transparent;
      border-radius: 6px;
      overflow: hidden;
      background: #f6f7f9;
    }
    .tile:hover { border-color: #cfe0f0; }
    .tile.active { border-color: #1e6eb5; box-shadow: 0 0 0 2px rgba(30,110,181,.25); }
    .tile img {
      width: 100%;
      object-fit: cover;
      display: block;
      background: #eef0f3;
    }
    .tile img.broken { visibility: hidden; }
    .tile-body { padding: 5px 7px 7px; }
    .tile-title {
      font-size: 11px;
      font-weight: 700;
      margin-bottom: 3px;
      white-space: normal;
      overflow-wrap: break-word;
      word-break: break-word;
    }
    .tile-metric {
      display: flex;
      justify-content: space-between;
      gap: 6px;
      font-size: 10px;
      color: #444;
      line-height: 1.4;
    }
    .tile-metric .metric-label { color: #777; white-space: normal; overflow-wrap: break-word; word-break: break-word; }
    .tile-metric .metric-value { font-weight: 600; white-space: normal; overflow-wrap: break-word; word-break: break-word; text-align: right; }

    /* Table layout */
    /* border-collapse:separate (not collapse) so position:sticky on thead th works
       reliably across browsers - sticky + collapsed table borders is a known combo
       that silently fails to stick in several engines. */
    table { border-collapse: separate; border-spacing: 0; width: 100%; table-layout: fixed; }
    thead th {
      position: sticky; top: 0; z-index: 1;
      background: #f6f7f9;
      border-bottom: 1px solid #dde1e7;
      text-align: left;
      padding: 6px 10px 6px 8px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .3px;
      color: #555;
      white-space: normal;
      overflow-wrap: break-word;
      word-break: break-word;
    }
    /* No position:relative here - sticky already establishes a positioning context for the
       resize-handle child, and setting relative on top of sticky was silently breaking the
       sticky effect for every draggable (metric) header - only the non-draggable Image/Title
       headers were actually staying pinned while scrolling. */
    thead th.draggable { cursor: grab; }
    thead th.dragging { opacity: .5; }
    .resize-handle {
      position: absolute;
      right: -3px;
      top: 0;
      width: 6px;
      height: 100%;
      cursor: col-resize;
      z-index: 2;
    }
    .resize-handle:hover, .resize-handle.active { background: rgba(30,110,181,.4); }
    tbody td {
      padding: 4px 8px;
      border-bottom: 1px solid #eef0f3;
      white-space: normal;
      overflow-wrap: break-word;
      word-break: break-word;
      vertical-align: top;
    }
    tr.row-item { cursor: pointer; }
    tr.row-item:hover td { background: #fafbfc; }
    tr.row-item.active td { background: #eaf2fb; }
    td.thumb-cell img {
      object-fit: cover;
      display: block;
      background: #eef0f3;
      border-radius: 3px;
    }
    td.thumb-cell img.broken { visibility: hidden; }

    .empty-state, .error-state {
      padding: 24px 16px;
      text-align: center;
      color: #666;
    }
    .error-state { color: #b3261e; }
    .empty-state button, .error-state button {
      margin-top: 10px;
      padding: 7px 14px;
      background: #1e6eb5;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
    }

    #hoverPreview {
      position: fixed;
      z-index: 1000;
      pointer-events: none;
      background: #fff;
      border: 1px solid #ccd1d9;
      border-radius: 6px;
      box-shadow: 0 4px 16px rgba(0,0,0,.18);
      padding: 8px;
      display: none;
      font-size: 12px;
      line-height: 1.5;
    }
    /* Image (+ whatever line immediately follows it in the template) is hoisted out of the
       column flow so it always sits centered above everything else, never side-by-side
       with a later column's text. */
    #hoverPreview .tt-header {
      text-align: center;
      margin-bottom: 8px;
      padding-bottom: 8px;
      border-bottom: 1px solid #eef0f3;
    }
    /* Explicit per-field column routing (not CSS multi-column auto-flow) - each field is
       assigned to a column bucket in Configure, so placement is deterministic. */
    #hoverPreview .tt-cols { display: flex; gap: 12px; }
    #hoverPreview .tt-col { flex: 1; min-width: 0; }
    #hoverPreview img {
      display: block;
      margin: 0 auto 6px;
      max-width: 260px;
      max-height: 200px;
      object-fit: contain;
      background: #eef0f3;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="header">
      <h1 id="title">Creative Gallery</h1>
      <span class="status" id="status"></span>
      <div class="actions">
        <button id="clearBtn" disabled>Clear filter</button>
        <button id="configureBtn">Configure</button>
      </div>
    </div>
    <div class="content" id="content">
      <div class="empty-state">Loading...</div>
    </div>
    <div id="hoverPreview"></div>
  </div>

  <script>
    let dashboard;
    let boundWs = null;
    let config = {
      worksheet: '', title: '', imageField: '', imageAlias: '', titleField: '', titleAlias: '',
      filterField: '', sortField: '', sortDirection: 'asc', layout: 'card', columns: 4,
      rowHeight: '', imageHeight: 90, imageWidth: 60, imageCellPadding: 16, displayFields: [], fieldAliases: {},
      targetWorksheets: [],
      tooltip: { enabled: true, template: '', columns: 1, width: 280, maxHeight: 360, fieldColumns: {} },
      rowColor: { enabled: false, field: '', operator: '>', threshold: 0, trueColor: '#d4edda', falseColor: '#f8d7da' },
      style: {
        fontFamily: '', fontSize: 12, textColor: '#1a1a1a',
        headerBold: true, headerItalic: false, headerUnderline: false,
        bodyBold: false, bodyItalic: false, bodyUnderline: false,
      },
    };
    let columnWidths = {}; // { [field]: px } - table column widths, persisted separately
    let selectedValue = null;
    let lastItems = [];
    let lastItemsByValue = new Map();
    let resizingField = null;
    let headerDragField = null;
    let lastHoverValue = null;

    const content = document.getElementById('content');
    const hoverPreview = document.getElementById('hoverPreview');

    function setStatus(text) {
      document.getElementById('status').textContent = text || '';
    }

    function escapeHtml(str) {
      const d = document.createElement('div');
      d.textContent = str == null ? '' : String(str);
      return d.innerHTML;
    }

    function fieldColId(field) {
      return 'col_' + field.replace(/[^a-zA-Z0-9]/g, '_');
    }

    function aliasFor(field) {
      if (field === config.imageField) return config.imageAlias || config.imageField;
      if (field === config.titleField) return config.titleAlias || config.titleField;
      return (config.fieldAliases && config.fieldAliases[field]) || field;
    }

    const TITLE_COL_KEY = '__title__';

    function colWidth(field, fallback) {
      if (columnWidths[field] != null) return columnWidths[field];
      return fallback != null ? fallback : 140;
    }

    function isConfigured() {
      return !!(config.worksheet && config.imageField && config.filterField);
    }

    function rowColorFor(item) {
      const rc = config.rowColor;
      if (!rc.enabled || !rc.field) return null;
      const raw = item.colorRaw;
      const num = typeof raw === 'number' ? raw : parseFloat(raw);
      if (Number.isNaN(num)) return rc.falseColor;
      let matched;
      switch (rc.operator) {
        case '>': matched = num > rc.threshold; break;
        case '>=': matched = num >= rc.threshold; break;
        case '<': matched = num < rc.threshold; break;
        case '<=': matched = num <= rc.threshold; break;
        case '==': matched = num === rc.threshold; break;
        case '!=': matched = num !== rc.threshold; break;
        default: matched = false;
      }
      return matched ? rc.trueColor : rc.falseColor;
    }

    function fontStyleString(bold, italic, underline) {
      return 'font-weight:' + (bold ? '700' : '400') + ';font-style:' + (italic ? 'italic' : 'normal') +
        ';text-decoration:' + (underline ? 'underline' : 'none') + ';';
    }

    function applyGlobalTextStyle() {
      content.style.fontFamily = config.style.fontFamily || '';
      content.style.fontSize = config.style.fontSize ? config.style.fontSize + 'px' : '';
      content.style.color = config.style.textColor || '';
    }

    function loadConfig() {
      const s = tableau.extensions.settings.getAll();
      let parsed = {};
      try { parsed = s.config ? JSON.parse(s.config) : {}; } catch (_) { parsed = {}; }
      config = {
        worksheet: parsed.worksheet || '',
        title: parsed.title || '',
        imageField: parsed.imageField || '',
        imageAlias: parsed.imageAlias || '',
        titleField: parsed.titleField || '',
        titleAlias: parsed.titleAlias || '',
        filterField: parsed.filterField || '',
        sortField: parsed.sortField || '',
        sortDirection: parsed.sortDirection === 'desc' ? 'desc' : 'asc',
        layout: parsed.layout === 'table' ? 'table' : 'card',
        columns: parsed.columns || 4,
        rowHeight: parsed.rowHeight || '',
        imageHeight: parsed.imageHeight || 90,
        imageWidth: parsed.imageWidth || 60,
        imageCellPadding: parsed.imageCellPadding != null ? parsed.imageCellPadding : 16,
        displayFields: Array.isArray(parsed.displayFields) ? parsed.displayFields : [],
        fieldAliases: (parsed.fieldAliases && typeof parsed.fieldAliases === 'object') ? parsed.fieldAliases : {},
        targetWorksheets: Array.isArray(parsed.targetWorksheets) ? parsed.targetWorksheets : [],
        tooltip: {
          enabled: !parsed.tooltip || parsed.tooltip.enabled !== false,
          template: (parsed.tooltip && typeof parsed.tooltip.template === 'string') ? parsed.tooltip.template : '',
          columns: (parsed.tooltip && parsed.tooltip.columns) || 1,
          width: (parsed.tooltip && parsed.tooltip.width) || 280,
          maxHeight: (parsed.tooltip && parsed.tooltip.maxHeight) || 360,
          fieldColumns: (parsed.tooltip && parsed.tooltip.fieldColumns && typeof parsed.tooltip.fieldColumns === 'object') ? parsed.tooltip.fieldColumns : {},
        },
        rowColor: {
          enabled: !!(parsed.rowColor && parsed.rowColor.enabled),
          field: (parsed.rowColor && parsed.rowColor.field) || '',
          operator: (parsed.rowColor && parsed.rowColor.operator) || '>',
          threshold: (parsed.rowColor && parsed.rowColor.threshold != null) ? parsed.rowColor.threshold : 0,
          trueColor: (parsed.rowColor && parsed.rowColor.trueColor) || '#d4edda',
          falseColor: (parsed.rowColor && parsed.rowColor.falseColor) || '#f8d7da',
        },
        style: {
          fontFamily: (parsed.style && parsed.style.fontFamily) || '',
          fontSize: (parsed.style && parsed.style.fontSize) || 12,
          textColor: (parsed.style && parsed.style.textColor) || '#1a1a1a',
          headerBold: !parsed.style || parsed.style.headerBold !== false,
          headerItalic: !!(parsed.style && parsed.style.headerItalic),
          headerUnderline: !!(parsed.style && parsed.style.headerUnderline),
          bodyBold: !!(parsed.style && parsed.style.bodyBold),
          bodyItalic: !!(parsed.style && parsed.style.bodyItalic),
          bodyUnderline: !!(parsed.style && parsed.style.bodyUnderline),
        },
      };
      if (!config.tooltip.template && parsed.tooltip &&
          (parsed.tooltip.showImage !== undefined || parsed.tooltip.showTitle !== undefined || Array.isArray(parsed.tooltip.fields))) {
        // Migrate settings saved under the older checkbox-based tooltip config.
        const t = parsed.tooltip;
        let html = '';
        if (t.showImage !== false && config.imageField) {
          html += '<div><span class="tt-field-image" data-tt-image="1">[Image]</span></div>';
        }
        if (t.showTitle !== false && config.titleField) {
          html += '<div><b><span data-tt-field="' + escapeHtml(config.titleField) + '">&lt;' +
            escapeHtml(config.titleField) + '&gt;</span></b></div>';
        }
        const fields = (Array.isArray(t.fields) && t.fields.length) ? t.fields : config.displayFields;
        fields.forEach(f => {
          html += '<div>' + escapeHtml(aliasFor(f)) + ': <span data-tt-field="' + escapeHtml(f) +
            '">&lt;' + escapeHtml(f) + '&gt;</span></div>';
        });
        config.tooltip.template = html;
      }
      if (!config.tooltip.template) {
        // No saved template at all (e.g. settings saved before the tooltip editor existed) -
        // fall back to a sensible auto-generated one instead of showing a blank tooltip.
        let html = '';
        if (config.imageField) html += '<div><span data-tt-image="1">[Image]</span></div>';
        if (config.titleField) {
          html += '<div><b><span data-tt-field="' + escapeHtml(config.titleField) + '">&lt;' +
            escapeHtml(config.titleField) + '&gt;</span></b></div>';
        }
        config.displayFields.forEach(f => {
          html += '<div>' + escapeHtml(aliasFor(f)) + ': <span data-tt-field="' + escapeHtml(f) +
            '">&lt;' + escapeHtml(f) + '&gt;</span></div>';
        });
        config.tooltip.template = html;
      }
      try { columnWidths = s.columnWidths ? JSON.parse(s.columnWidths) : {}; } catch (_) { columnWidths = {}; }
    }

    function renderUnconfigured(message) {
      content.innerHTML =
        '<div class="empty-state">' +
        escapeHtml(message || 'This extension has not been configured yet.') +
        '<br><button id="configureNow">Configure</button></div>';
      document.getElementById('configureNow').addEventListener('click', openConfigure);
    }

    function renderError(message) {
      content.innerHTML = '<div class="error-state">' + escapeHtml(message) + '</div>';
    }

    function bindWorksheetEvents() {
      if (boundWs) {
        boundWs.removeEventListener(tableau.TableauEventType.FilterChanged, loadAndRender);
        boundWs.removeEventListener(tableau.TableauEventType.SummaryDataChanged, loadAndRender);
        boundWs = null;
      }
      if (!config.worksheet) return;
      const ws = dashboard.worksheets.find(w => w.name === config.worksheet);
      if (!ws) return;
      ws.addEventListener(tableau.TableauEventType.FilterChanged, loadAndRender);
      ws.addEventListener(tableau.TableauEventType.SummaryDataChanged, loadAndRender);
      boundWs = ws;
    }

    async function loadAndRender() {
      if (!isConfigured()) { renderUnconfigured(); return; }

      const ws = dashboard.worksheets.find(w => w.name === config.worksheet);
      if (!ws) {
        renderUnconfigured('Configured worksheet "' + config.worksheet + '" was not found on this dashboard. It may have been renamed or removed.');
        return;
      }

      let table;
      try {
        table = await ws.getSummaryDataAsync({ ignoreSelection: true });
      } catch (e) {
        renderError('Could not read data from "' + config.worksheet + '": ' + e.message);
        return;
      }

      const fieldNames = table.columns.map(c => c.fieldName);
      const imgIdx = fieldNames.indexOf(config.imageField);
      const filterIdx = fieldNames.indexOf(config.filterField);
      const titleIdx = config.titleField ? fieldNames.indexOf(config.titleField) : -1;
      const sortIdx = config.sortField ? fieldNames.indexOf(config.sortField) : -1;
      const colorIdx = config.rowColor.enabled && config.rowColor.field ? fieldNames.indexOf(config.rowColor.field) : -1;
      const templateFields = [];
      {
        const re = /data-tt-field="([^"]+)"/g;
        let m;
        while ((m = re.exec(config.tooltip.template || '')) !== null) templateFields.push(m[1]);
      }
      const neededFields = Array.from(new Set([
        ...config.displayFields,
        ...(config.titleField ? [config.titleField] : []),
        ...templateFields,
      ]));
      const displayIdx = neededFields
        .map(f => ({ field: f, idx: fieldNames.indexOf(f) }))
        .filter(d => d.idx !== -1);

      if (imgIdx === -1 || filterIdx === -1) {
        renderUnconfigured('Configured fields are no longer available on "' + config.worksheet + '". Please reconfigure.');
        return;
      }

      document.getElementById('title').textContent = config.title || ('Creative Gallery — ' + config.worksheet);

      if (table.totalRowCount === 0) {
        content.innerHTML = '<div class="empty-state">No creatives to show (check filters on "' + config.worksheet + '").</div>';
        lastItems = [];
        lastItemsByValue = new Map();
        return;
      }

      const seen = new Set();
      const items = [];
      table.data.forEach(r => {
        const value = r[filterIdx].value;
        if (value == null || seen.has(value)) return;
        seen.add(value);
        const metricsMap = {};
        displayIdx.forEach(d => { metricsMap[d.field] = r[d.idx].formattedValue; });
        items.push({
          value: value,
          title: titleIdx !== -1 ? r[titleIdx].formattedValue : r[filterIdx].formattedValue,
          imageUrl: r[imgIdx].formattedValue,
          metricsMap: metricsMap,
          sortRaw: sortIdx !== -1 ? r[sortIdx].value : null,
          colorRaw: colorIdx !== -1 ? r[colorIdx].value : null,
        });
      });

      if (sortIdx !== -1) {
        items.sort((a, b) => {
          const av = a.sortRaw, bv = b.sortRaw;
          let cmp;
          if (typeof av === 'number' && typeof bv === 'number') cmp = av - bv;
          else cmp = String(av).localeCompare(String(bv), undefined, { numeric: true });
          return config.sortDirection === 'desc' ? -cmp : cmp;
        });
      }

      lastItems = items;
      lastItemsByValue = new Map(items.map(it => [String(it.value), it]));

      applyGlobalTextStyle();
      if (config.layout === 'table') renderTable(items);
      else renderCards(items);
    }

    function renderCards(items) {
      const titleStyle = fontStyleString(config.style.headerBold, config.style.headerItalic, config.style.headerUnderline);
      const bodyStyle = fontStyleString(config.style.bodyBold, config.style.bodyItalic, config.style.bodyUnderline);
      let html = '<div class="gallery" style="--cols:' + config.columns + '">';
      items.forEach(t => {
        const active = String(t.value) === String(selectedValue) ? ' active' : '';
        const bg = rowColorFor(t);
        const tileStyle = bg ? ' style="background:' + bg + '"' : '';
        html += '<div class="tile' + active + '" data-value="' + escapeHtml(t.value) + '"' + tileStyle + '>' +
          '<img src="' + escapeHtml(t.imageUrl) + '" alt="' + escapeHtml(t.title) +
          '" loading="lazy" style="height:' + config.imageHeight + 'px" onerror="this.classList.add(\'broken\')">' +
          '<div class="tile-body">';
        if (config.titleField) html += '<div class="tile-title" style="' + titleStyle + '">' + escapeHtml(t.title) + '</div>';
        config.displayFields.forEach(f => {
          html += '<div class="tile-metric" style="' + bodyStyle + '"><span class="metric-label">' + escapeHtml(aliasFor(f)) +
            '</span><span class="metric-value">' + escapeHtml(t.metricsMap[f]) + '</span></div>';
        });
        html += '</div></div>';
      });
      html += '</div>';
      content.innerHTML = html;
      document.getElementById('clearBtn').disabled = selectedValue == null;
    }

    function renderTable(items) {
      const headerStyle = fontStyleString(config.style.headerBold, config.style.headerItalic, config.style.headerUnderline);
      const bodyStyle = fontStyleString(config.style.bodyBold, config.style.bodyItalic, config.style.bodyUnderline);

      let html = '<table><colgroup><col style="width:' + config.imageWidth + 'px">';
      if (config.titleField) {
        html += '<col id="' + fieldColId(TITLE_COL_KEY) + '" style="width:' + colWidth(TITLE_COL_KEY, 180) + 'px">';
      }
      config.displayFields.forEach(f => {
        html += '<col id="' + fieldColId(f) + '" style="width:' + colWidth(f) + 'px">';
      });
      html += '</colgroup><thead><tr>';
      html += '<th style="' + headerStyle + '">' + escapeHtml(config.imageAlias || 'Image') + '</th>';
      if (config.titleField) {
        html += '<th data-field="' + TITLE_COL_KEY + '" style="' + headerStyle + '">' + escapeHtml(aliasFor(config.titleField)) +
          '<div class="resize-handle" data-field="' + TITLE_COL_KEY + '"></div></th>';
      }
      config.displayFields.forEach(f => {
        html += '<th class="draggable" data-field="' + escapeHtml(f) + '" style="' + headerStyle + '">' + escapeHtml(aliasFor(f)) +
          '<div class="resize-handle" data-field="' + escapeHtml(f) + '"></div></th>';
      });
      html += '</tr></thead><tbody>';

      items.forEach(t => {
        const active = String(t.value) === String(selectedValue) ? ' active' : '';
        const bg = rowColorFor(t);
        const rowStyleParts = [];
        if (config.rowHeight) rowStyleParts.push('min-height:' + config.rowHeight + 'px');
        if (bg) rowStyleParts.push('background:' + bg);
        const rowStyle = rowStyleParts.length ? ' style="' + rowStyleParts.join(';') + '"' : '';
        html += '<tr class="row-item' + active + '" data-value="' + escapeHtml(t.value) + '"' + rowStyle + '>' +
          '<td class="thumb-cell" style="padding-right:' + config.imageCellPadding + 'px"><img src="' + escapeHtml(t.imageUrl) + '" alt="' + escapeHtml(t.title) +
          '" loading="lazy" style="width:' + config.imageWidth + 'px;height:' + config.imageHeight + 'px" onerror="this.classList.add(\'broken\')"></td>';
        if (config.titleField) html += '<td style="' + bodyStyle + '">' + escapeHtml(t.title) + '</td>';
        config.displayFields.forEach(f => { html += '<td style="' + bodyStyle + '">' + escapeHtml(t.metricsMap[f]) + '</td>'; });
        html += '</tr>';
      });
      html += '</tbody></table>';
      content.innerHTML = html;
      document.getElementById('clearBtn').disabled = selectedValue == null;
    }

    async function applyFilterToTargets(value) {
      setStatus('Filtering...');
      let hadError = false;
      for (const name of config.targetWorksheets) {
        const ws = dashboard.worksheets.find(w => w.name === name);
        if (!ws) continue;
        try {
          await ws.applyFilterAsync(config.filterField, [value], tableau.FilterUpdateType.Replace);
        } catch (e) {
          hadError = true;
        }
      }
      setStatus(hadError ? 'Some sheets could not be filtered' : '');
    }

    async function clearFilterOnTargets() {
      setStatus('Clearing...');
      for (const name of config.targetWorksheets) {
        const ws = dashboard.worksheets.find(w => w.name === name);
        if (!ws) continue;
        try {
          await ws.clearFilterAsync(config.filterField);
        } catch (e) {
          // field may not exist on this sheet - nothing to clear
        }
      }
      setStatus('');
    }

    async function onItemClick(value) {
      const item = content.querySelector('[data-value="' + CSS.escape(String(value)) + '"]');
      if (String(selectedValue) === String(value)) {
        selectedValue = null;
        if (item) item.classList.remove('active');
        document.getElementById('clearBtn').disabled = true;
        await clearFilterOnTargets();
        return;
      }
      const prevActive = content.querySelector('.active');
      if (prevActive) prevActive.classList.remove('active');
      selectedValue = value;
      if (item) item.classList.add('active');
      document.getElementById('clearBtn').disabled = false;
      await applyFilterToTargets(value);
    }

    async function persistConfig() {
      tableau.extensions.settings.set('config', JSON.stringify(config));
      await tableau.extensions.settings.saveAsync();
    }

    async function persistColumnWidths() {
      tableau.extensions.settings.set('columnWidths', JSON.stringify(columnWidths));
      await tableau.extensions.settings.saveAsync();
    }

    function startResize(e, field) {
      const colEl = document.getElementById(fieldColId(field));
      if (!colEl) return;
      resizingField = field;
      const startX = e.clientX;
      const startWidth = colEl.offsetWidth || colWidth(field);
      e.target.classList.add('active');

      function onMove(ev) {
        const w = Math.max(50, startWidth + (ev.clientX - startX));
        colEl.style.width = w + 'px';
      }
      function onUp() {
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
        e.target.classList.remove('active');
        columnWidths[field] = parseInt(colEl.style.width, 10);
        resizingField = null;
        persistColumnWidths();
      }
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
      e.preventDefault();
    }

    // Mouse-based drag reorder (not native HTML5 drag-and-drop, which behaves
    // inconsistently for this kind of live-reordering sortable header row).
    function startHeaderDrag(e, field) {
      headerDragField = field;
      let moved = false;
      const startTh = content.querySelector('th[data-field="' + CSS.escape(field) + '"]');
      if (startTh) startTh.classList.add('dragging');
      document.body.style.cursor = 'grabbing';

      function onMove(ev) {
        const el = document.elementFromPoint(ev.clientX, ev.clientY);
        const targetTh = el && el.closest && el.closest('th.draggable');
        if (!targetTh) return;
        const targetField = targetTh.getAttribute('data-field');
        if (!targetField || targetField === headerDragField) return;
        const newOrder = config.displayFields.filter(f => f !== headerDragField);
        const idx = newOrder.indexOf(targetField);
        if (idx === -1) return;
        newOrder.splice(idx, 0, headerDragField);
        config.displayFields = newOrder;
        moved = true;
        renderTable(lastItems);
        const th2 = content.querySelector('th[data-field="' + CSS.escape(headerDragField) + '"]');
        if (th2) th2.classList.add('dragging');
      }
      function onUp() {
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
        document.body.style.cursor = '';
        content.querySelectorAll('th.dragging').forEach(el => el.classList.remove('dragging'));
        headerDragField = null;
        if (moved) persistConfig();
      }
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
      e.preventDefault();
    }

    function substituteTooltipChips(html, item) {
      let out = html.replace(/<span[^>]*data-tt-image="[^"]*"[^>]*>.*?<\/span>/g, () => {
        if (!item.imageUrl) return '';
        return '<img src="' + escapeHtml(item.imageUrl) +
          '" style="max-width:260px;max-height:200px;object-fit:contain;display:block;border-radius:4px;background:#eef0f3;" onerror="this.style.display=\'none\'">';
      });
      out = out.replace(/<span[^>]*data-tt-field="([^"]+)"[^>]*>.*?<\/span>/g, (m, field) => {
        return escapeHtml(item.metricsMap[field] == null ? '' : item.metricsMap[field]);
      });
      return out;
    }

    function renderTooltipHtml(item) {
      // Parse the raw (pre-substitution) template so chip attributes are still readable -
      // that's how we know which field each block belongs to, for both header-hoisting and
      // per-field column routing, without caring where that block ends up textually.
      const container = document.createElement('div');
      container.innerHTML = config.tooltip.template || '';
      const children = Array.from(container.children);

      let imgIdx = -1;
      for (let i = 0; i < children.length; i++) {
        if (children[i].querySelector('[data-tt-image]')) { imgIdx = i; break; }
      }

      const consumed = new Set();
      let headerEls = [];
      if (imgIdx !== -1) {
        headerEls = [children[imgIdx]];
        consumed.add(imgIdx);
        if (children[imgIdx + 1]) {
          headerEls.push(children[imgIdx + 1]);
          consumed.add(imgIdx + 1);
        }
      }
      const headerHtml = headerEls.map(el => substituteTooltipChips(el.outerHTML, item)).join('');

      // Route each remaining block to the column assigned (in Configure) to the first field
      // chip it contains - deterministic placement instead of automatic CSS column reflow.
      const cols = Math.max(1, Math.min(4, config.tooltip.columns || 1));
      const buckets = Array.from({ length: cols }, () => []);
      children.forEach((el, i) => {
        if (consumed.has(i)) return;
        const fieldSpan = el.querySelector('[data-tt-field]');
        const field = fieldSpan ? fieldSpan.getAttribute('data-tt-field') : null;
        const assigned = field && config.tooltip.fieldColumns ? config.tooltip.fieldColumns[field] : null;
        const col = Math.max(1, Math.min(cols, assigned || 1));
        buckets[col - 1].push(substituteTooltipChips(el.outerHTML, item));
      });

      const bodyHtml = '<div class="tt-cols">' +
        buckets.map(b => '<div class="tt-col">' + b.join('') + '</div>').join('') +
        '</div>';

      return (headerHtml ? '<div class="tt-header">' + headerHtml + '</div>' : '') + bodyHtml;
    }

    function hideHoverPreview() {
      hoverPreview.style.display = 'none';
      lastHoverValue = null;
    }

    function showHoverPreview(value, x, y) {
      const item = lastItemsByValue.get(String(value));
      if (!item) { hideHoverPreview(); return; }

      if (lastHoverValue !== String(value)) {
        lastHoverValue = String(value);
        hoverPreview.innerHTML = renderTooltipHtml(item);
      }

      hoverPreview.style.width = (config.tooltip.width || 280) + 'px';
      hoverPreview.style.maxHeight = (config.tooltip.maxHeight || 360) + 'px';
      hoverPreview.style.overflowY = 'auto';
      hoverPreview.style.display = 'block';
      const pad = 16;
      let left = x + pad;
      let top = y + pad;
      const rect = hoverPreview.getBoundingClientRect();
      if (left + rect.width > window.innerWidth) left = Math.max(4, x - rect.width - pad);
      if (top + rect.height > window.innerHeight) top = Math.max(4, y - rect.height - pad);
      hoverPreview.style.left = left + 'px';
      hoverPreview.style.top = top + 'px';
    }

    async function openConfigure() {
      const payload = JSON.stringify(config);
      try {
        const result = await tableau.extensions.ui.displayDialogAsync(
          './config.html', payload, { height: 700, width: 520 }
        );
        if (!result) return;
        const parsed = JSON.parse(result);
        tableau.extensions.settings.set('config', JSON.stringify(parsed));
        await tableau.extensions.settings.saveAsync();
        selectedValue = null;
        loadConfig();
        bindWorksheetEvents();
        await loadAndRender();
      } catch (e) {
        // user cancelled the dialog - ErrorCodes.DialogClosedByUser - nothing to do
      }
    }

    async function init() {
      await tableau.extensions.initializeAsync({ configure: openConfigure });
      dashboard = tableau.extensions.dashboardContent.dashboard;
      loadConfig();
      bindWorksheetEvents();
      await loadAndRender();

      document.getElementById('configureBtn').addEventListener('click', openConfigure);
      document.getElementById('clearBtn').addEventListener('click', () => onItemClick(selectedValue));

      content.addEventListener('click', e => {
        const item = e.target.closest('[data-value]');
        if (item) onItemClick(item.getAttribute('data-value'));
      });

      content.addEventListener('mousedown', e => {
        const handle = e.target.closest('.resize-handle');
        if (handle) { startResize(e, handle.getAttribute('data-field')); return; }
        const th = e.target.closest('th.draggable');
        if (th) startHeaderDrag(e, th.getAttribute('data-field'));
      });

      content.addEventListener('mousemove', e => {
        if (!config.tooltip.enabled) return;
        const item = e.target.closest('[data-value]');
        if (!item) { hideHoverPreview(); return; }
        showHoverPreview(item.getAttribute('data-value'), e.clientX, e.clientY);
      });
      content.addEventListener('mouseleave', hideHoverPreview);
    }

    init().catch(e => renderError('Failed to initialize: ' + e.message));
  </script>
</body>
</html>
