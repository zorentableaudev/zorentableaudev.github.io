<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Row Notes</title>
  <script src="./tableau.extensions.1.latest.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 12px;
      color: #1a1a1a;
      background: #fff;
      height: 100vh;
      overflow: hidden;
    }
    #app { display: flex; flex-direction: column; height: 100vh; }

    .header {
      background: #1e6eb5;
      color: #fff;
      padding: 8px 12px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .header h1 { font-size: 12px; font-weight: 700; letter-spacing: .2px; }
    .header .status { font-size: 10px; opacity: .85; }
    .header button {
      background: rgba(255,255,255,.15);
      color: #fff;
      border: 1px solid rgba(255,255,255,.4);
      border-radius: 4px;
      padding: 4px 9px;
      font-size: 11px;
      cursor: pointer;
    }
    .header button:hover { background: rgba(255,255,255,.28); }

    .content { flex: 1; overflow: auto; }

    .warning {
      background: #fff6e5;
      color: #8a5a00;
      font-size: 11px;
      padding: 6px 10px;
      border-bottom: 1px solid #f0ddb0;
    }

    table { border-collapse: collapse; width: 100%; table-layout: fixed; }
    thead th {
      position: sticky; top: 0; z-index: 1;
      background: #f6f7f9;
      border-bottom: 1px solid #dde1e7;
      text-align: left;
      padding: 6px 10px 6px 8px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .3px;
      color: #555;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    thead th.new-col { background: #eaf2fb; color: #1e6eb5; }
    thead th { cursor: grab; }
    thead th.dragging { opacity: .5; }
    .resize-handle {
      position: absolute;
      right: -3px;
      top: 0;
      width: 6px;
      height: 100%;
      cursor: col-resize;
      z-index: 2;
    }
    .resize-handle:hover, .resize-handle.active { background: rgba(30,110,181,.4); }
    tbody td {
      padding: 4px 8px;
      border-bottom: 1px solid #eef0f3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    tbody tr:hover td { background: #fafbfc; }
    input[type=text].cell-input {
      width: 100%;
      padding: 4px 6px;
      border: 1px solid #ccd1d9;
      border-radius: 3px;
      font-size: 12px;
      font-family: inherit;
    }
    input[type=text].cell-input:focus { border-color: #1e6eb5; outline: none; }
    select.cell-select {
      width: 100%;
      padding: 4px 6px;
      border: 1px solid #ccd1d9;
      border-radius: 3px;
      font-size: 12px;
      font-family: inherit;
      background: #fff;
    }
    td.new-col { background: #f9fcff; }

    .empty-state, .error-state {
      padding: 24px 16px;
      text-align: center;
      color: #666;
    }
    .error-state { color: #b3261e; }
    .empty-state button, .error-state button {
      margin-top: 10px;
      padding: 7px 14px;
      background: #1e6eb5;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="header">
      <h1 id="title">Row Notes</h1>
      <span class="status" id="status"></span>
      <button id="configureBtn">Configure</button>
    </div>
    <div class="content" id="content">
      <div class="empty-state">Loading...</div>
    </div>
  </div>

  <script>
    let dashboard;
    let boundWs = null;
    let resizingToken = null;
    let headerDragToken = null;
    let lastConfigRaw = '';

    // config.columnOrder: array of tokens, each "src:<fieldName>" or "custom:<id>"
    // config.customColumns: { [id]: { id, label, type: 'text'|'select', options?: string[], optionColors?: { [option]: hex } } }
    // config.sourceAliases: { [sourceFieldName]: displayLabel }
    // config.title: optional custom extension title
    let config = { worksheet: '', keyField: '', title: '', columnOrder: [], customColumns: {}, sourceAliases: {} };
    let columnWidths = {};   // { [token]: pixelWidth }
    let rowData = {};        // { [rowKey]: { [customColumnId]: value } }

    // Cache of the last fetched worksheet data, so header-drag reordering can
    // re-render instantly without an extra getSummaryDataAsync round trip per step.
    let lastFieldNames = [];
    let lastRows = [];
    let lastKeyIdx = -1;

    let saveTimer = null;
    const dirtyCells = new Set(); // "rowKey::colId" tags with an unsaved local edit in flight

    const content = document.getElementById('content');

    function setStatus(text) {
      document.getElementById('status').textContent = text || '';
    }

    function escapeHtml(str) {
      const d = document.createElement('div');
      d.textContent = str == null ? '' : String(str);
      return d.innerHTML;
    }

    function tokenId(token) {
      return 'col_' + token.replace(/[^a-zA-Z0-9]/g, '_');
    }

    function colLabel(token) {
      if (token.startsWith('src:')) {
        const field = token.slice(4);
        return (config.sourceAliases && config.sourceAliases[field]) || field;
      }
      const def = config.customColumns[token.slice(7)];
      return def ? def.label : token;
    }

    function selectColor(def, value) {
      return (value && def.optionColors && def.optionColors[value]) || '';
    }

    function colWidth(token) {
      if (columnWidths[token] != null) return columnWidths[token];
      if (token.startsWith('src:')) return 140;
      const def = config.customColumns[token.slice(7)];
      return def && def.type === 'select' ? 110 : 160;
    }

    function isConfigured() {
      return !!(config.worksheet && config.keyField && config.columnOrder.length);
    }

    function loadConfig() {
      const s = tableau.extensions.settings.getAll();
      lastConfigRaw = s.config || '';
      let parsed = {};
      try { parsed = s.config ? JSON.parse(s.config) : {}; } catch (_) { parsed = {}; }
      config = {
        worksheet: parsed.worksheet || '',
        keyField: parsed.keyField || '',
        title: parsed.title || '',
        columnOrder: Array.isArray(parsed.columnOrder) ? parsed.columnOrder : [],
        customColumns: (parsed.customColumns && typeof parsed.customColumns === 'object') ? parsed.customColumns : {},
        sourceAliases: (parsed.sourceAliases && typeof parsed.sourceAliases === 'object') ? parsed.sourceAliases : {},
      };
      try { columnWidths = s.columnWidths ? JSON.parse(s.columnWidths) : {}; } catch (_) { columnWidths = {}; }
      try { rowData = s.rowData ? JSON.parse(s.rowData) : {}; } catch (_) { rowData = {}; }
    }

    function renderUnconfigured(message) {
      content.innerHTML =
        '<div class="empty-state">' +
        escapeHtml(message || 'This extension has not been configured yet.') +
        '<br><button id="configureNow">Configure</button></div>';
      document.getElementById('configureNow').addEventListener('click', openConfigure);
    }

    function renderError(message) {
      content.innerHTML = '<div class="error-state">' + escapeHtml(message) + '</div>';
    }

    function bindWorksheetEvents() {
      if (boundWs) {
        boundWs.removeEventListener(tableau.TableauEventType.FilterChanged, loadAndRender);
        boundWs.removeEventListener(tableau.TableauEventType.SummaryDataChanged, loadAndRender);
        boundWs = null;
      }
      if (!config.worksheet) return;
      const ws = dashboard.worksheets.find(w => w.name === config.worksheet);
      if (!ws) return;
      ws.addEventListener(tableau.TableauEventType.FilterChanged, loadAndRender);
      ws.addEventListener(tableau.TableauEventType.SummaryDataChanged, loadAndRender);
      boundWs = ws;
    }

    async function loadAndRender() {
      if (!isConfigured()) { renderUnconfigured(); return; }

      const ws = dashboard.worksheets.find(w => w.name === config.worksheet);
      if (!ws) {
        renderUnconfigured('Configured worksheet "' + config.worksheet + '" was not found on this dashboard. It may have been renamed or removed.');
        return;
      }

      let table;
      try {
        table = await ws.getSummaryDataAsync({ ignoreSelection: true });
      } catch (e) {
        renderError('Could not read data from "' + config.worksheet + '": ' + e.message);
        return;
      }

      const fieldNames = table.columns.map(c => c.fieldName);
      const keyIdx = fieldNames.indexOf(config.keyField);
      if (keyIdx === -1) {
        renderUnconfigured('Configured row identifier field "' + config.keyField + '" is no longer available on "' + config.worksheet + '".');
        return;
      }

      document.getElementById('title').textContent = config.title || ('Row Notes — ' + config.worksheet);

      if (table.totalRowCount === 0) {
        content.innerHTML = '<div class="empty-state">No rows to show (check filters on "' + config.worksheet + '").</div>';
        return;
      }

      const rows = table.data.map(r => r.map(cell => cell.formattedValue));
      lastFieldNames = fieldNames;
      lastRows = rows;
      lastKeyIdx = keyIdx;

      renderFromColumnOrder();
    }

    function renderFromColumnOrder() {
      const missingSource = [];
      const tokens = config.columnOrder.filter(t => {
        if (t.startsWith('src:')) {
          const ok = lastFieldNames.includes(t.slice(4));
          if (!ok) missingSource.push(t.slice(4));
          return ok;
        }
        return !!config.customColumns[t.slice(7)];
      });
      renderTable(lastRows, lastKeyIdx, lastFieldNames, tokens, missingSource);
    }

    function renderTable(rows, keyIdx, fieldNames, tokens, missingSource) {
      const seenKeys = new Set();

      let html = '';
      if (missingSource.length) {
        html += '<div class="warning">Hidden — no longer on this worksheet: ' +
          missingSource.map(escapeHtml).join(', ') + '</div>';
      }

      html += '<table><colgroup>' +
        tokens.map(t => '<col id="' + tokenId(t) + '" style="width:' + colWidth(t) + 'px">').join('') +
        '</colgroup><thead><tr>';
      tokens.forEach(t => {
        const cls = t.startsWith('custom:') ? ' class="new-col"' : '';
        html += '<th' + cls + ' data-token="' + t + '">' + escapeHtml(colLabel(t)) +
          '<div class="resize-handle" data-token="' + t + '"></div></th>';
      });
      html += '</tr></thead><tbody>';

      rows.forEach(cells => {
        const key = cells[keyIdx];
        if (seenKeys.has(key)) return; // guard against a non-unique key field
        seenKeys.add(key);
        const savedRow = rowData[key] || {};

        html += '<tr data-key="' + escapeHtml(key) + '">';
        tokens.forEach(t => {
          if (t.startsWith('src:')) {
            const idx = fieldNames.indexOf(t.slice(4));
            html += '<td>' + escapeHtml(cells[idx]) + '</td>';
            return;
          }
          const id = t.slice(7);
          const def = config.customColumns[id];
          const val = savedRow[id] || '';
          if (def.type === 'select') {
            const opts = def.options || [];
            const bg = selectColor(def, val);
            html += '<td class="new-col"><select class="cell-select" data-row-key="' + escapeHtml(key) +
              '" data-col-id="' + id + '"' + (bg ? ' style="background-color:' + bg + '"' : '') +
              '><option value=""' + (val === '' ? ' selected' : '') + '>—</option>' +
              opts.map(o => {
                const optBg = def.optionColors && def.optionColors[o];
                return '<option value="' + escapeHtml(o) + '"' + (val === o ? ' selected' : '') +
                  (optBg ? ' style="background-color:' + optBg + '"' : '') + '>' + escapeHtml(o) + '</option>';
              }).join('') +
              '</select></td>';
          } else {
            html += '<td class="new-col"><input type="text" class="cell-input" data-row-key="' + escapeHtml(key) +
              '" data-col-id="' + id + '" value="' + escapeHtml(val) + '"></td>';
          }
        });
        html += '</tr>';
      });
      html += '</tbody></table>';

      content.innerHTML = html;
    }

    function onEdit(e) {
      const key = e.target.getAttribute('data-row-key');
      const colId = e.target.getAttribute('data-col-id');
      if (!rowData[key]) rowData[key] = {};
      rowData[key][colId] = e.target.value;
      if (e.target.classList.contains('cell-select')) {
        e.target.style.backgroundColor = selectColor(config.customColumns[colId], e.target.value);
      }
      dirtyCells.add(key + '::' + colId);
      scheduleSave();
    }

    function scheduleSave() {
      setStatus('Editing...');
      clearTimeout(saveTimer);
      saveTimer = setTimeout(persist, 600);
    }

    async function persist() {
      setStatus('Saving...');
      try {
        tableau.extensions.settings.set('rowData', JSON.stringify(rowData));
        tableau.extensions.settings.set('columnWidths', JSON.stringify(columnWidths));
        await tableau.extensions.settings.saveAsync();
        dirtyCells.clear();
        setStatus('Saved');
        setTimeout(() => setStatus(''), 1500);
      } catch (e) {
        setStatus('Save failed: ' + e.message);
      }
    }

    function mergeIncomingRowData(s) {
      let incoming = {};
      try { incoming = s.rowData ? JSON.parse(s.rowData) : {}; } catch (_) { return; }

      const active = document.activeElement;
      const activeKey = active && active.getAttribute && active.getAttribute('data-row-key');
      const activeColId = active && active.getAttribute && active.getAttribute('data-col-id');

      Object.keys(incoming).forEach(key => {
        const incomingCols = incoming[key] || {};
        Object.keys(incomingCols).forEach(colId => {
          if (dirtyCells.has(key + '::' + colId)) return;
          if (!rowData[key]) rowData[key] = {};
          rowData[key][colId] = incomingCols[colId];
          if (key === activeKey && colId === activeColId) return;
          const el = content.querySelector(
            '[data-row-key="' + CSS.escape(key) + '"][data-col-id="' + CSS.escape(colId) + '"]'
          );
          if (!el) return;
          el.value = incomingCols[colId] || '';
          if (el.classList.contains('cell-select')) {
            el.style.backgroundColor = selectColor(config.customColumns[colId], el.value);
          }
        });
      });
    }

    function mergeIncomingColumnWidths(s) {
      let incoming = {};
      try { incoming = s.columnWidths ? JSON.parse(s.columnWidths) : {}; } catch (_) { return; }
      Object.keys(incoming).forEach(token => {
        if (resizingToken === token) return; // don't fight an active local drag
        columnWidths[token] = incoming[token];
        const colEl = document.getElementById(tokenId(token));
        if (colEl) colEl.style.width = incoming[token] + 'px';
      });
    }

    function onSettingsChanged() {
      const s = tableau.extensions.settings.getAll();
      const incomingConfigRaw = s.config || '';
      if (incomingConfigRaw !== lastConfigRaw) {
        loadConfig();
        bindWorksheetEvents();
        loadAndRender();
        return;
      }
      mergeIncomingRowData(s);
      mergeIncomingColumnWidths(s);
    }

    function startResize(e, token) {
      const colEl = document.getElementById(tokenId(token));
      if (!colEl) return;
      resizingToken = token;
      const startX = e.clientX;
      const startWidth = colEl.offsetWidth || colWidth(token);
      e.target.classList.add('active');

      function onMove(ev) {
        const w = Math.max(50, startWidth + (ev.clientX - startX));
        colEl.style.width = w + 'px';
      }
      function onUp() {
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
        e.target.classList.remove('active');
        columnWidths[token] = parseInt(colEl.style.width, 10);
        resizingToken = null;
        scheduleSave();
      }
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
      e.preventDefault();
    }

    async function persistConfig() {
      setStatus('Saving...');
      try {
        const payload = JSON.stringify(config);
        lastConfigRaw = payload;
        tableau.extensions.settings.set('config', payload);
        await tableau.extensions.settings.saveAsync();
        setStatus('Saved');
        setTimeout(() => setStatus(''), 1500);
      } catch (e) {
        setStatus('Save failed: ' + e.message);
      }
    }

    // Same mouse-based drag pattern as column resize/config-dialog reorder:
    // live-reorders as the cursor crosses into another header, then persists once on mouseup.
    function startHeaderDrag(e, token) {
      headerDragToken = token;
      let moved = false;
      const startTh = content.querySelector('th[data-token="' + CSS.escape(token) + '"]');
      if (startTh) startTh.classList.add('dragging');
      document.body.style.cursor = 'grabbing';

      function onMove(ev) {
        const el = document.elementFromPoint(ev.clientX, ev.clientY);
        const targetTh = el && el.closest && el.closest('th');
        if (!targetTh) return;
        const targetToken = targetTh.getAttribute('data-token');
        if (!targetToken || targetToken === headerDragToken) return;
        const newOrder = config.columnOrder.filter(t => t !== headerDragToken);
        const idx = newOrder.indexOf(targetToken);
        if (idx === -1) return;
        newOrder.splice(idx, 0, headerDragToken);
        config.columnOrder = newOrder;
        moved = true;
        renderFromColumnOrder();
        const th2 = content.querySelector('th[data-token="' + CSS.escape(headerDragToken) + '"]');
        if (th2) th2.classList.add('dragging');
      }
      function onUp() {
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
        document.body.style.cursor = '';
        content.querySelectorAll('th.dragging').forEach(el => el.classList.remove('dragging'));
        headerDragToken = null;
        if (moved) persistConfig();
      }
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
      e.preventDefault();
    }

    async function openConfigure() {
      const payload = JSON.stringify({
        worksheet: config.worksheet,
        keyField: config.keyField,
        title: config.title,
        columnOrder: config.columnOrder,
        customColumns: config.customColumns,
        sourceAliases: config.sourceAliases,
      });
      try {
        const result = await tableau.extensions.ui.displayDialogAsync(
          './config.html', payload, { height: 620, width: 560 }
        );
        if (!result) return;
        const parsed = JSON.parse(result);
        tableau.extensions.settings.set('config', JSON.stringify({
          worksheet: parsed.worksheet,
          keyField: parsed.keyField,
          title: parsed.title,
          columnOrder: parsed.columnOrder,
          customColumns: parsed.customColumns,
          sourceAliases: parsed.sourceAliases,
        }));
        await tableau.extensions.settings.saveAsync();
        loadConfig();
        bindWorksheetEvents();
        await loadAndRender();
      } catch (e) {
        // user cancelled the dialog - ErrorCodes.DialogClosedByUser - nothing to do
      }
    }

    async function init() {
      await tableau.extensions.initializeAsync({ configure: openConfigure });
      dashboard = tableau.extensions.dashboardContent.dashboard;
      loadConfig();
      bindWorksheetEvents();
      await loadAndRender();

      document.getElementById('configureBtn').addEventListener('click', openConfigure);
      tableau.extensions.settings.addEventListener(
        tableau.TableauEventType.SettingsChanged, onSettingsChanged
      );

      content.addEventListener('input', e => {
        if (e.target.classList.contains('cell-input')) onEdit(e);
      });
      content.addEventListener('change', e => {
        if (e.target.classList.contains('cell-select')) onEdit(e);
      });
      content.addEventListener('mousedown', e => {
        const handle = e.target.closest('.resize-handle');
        if (handle) { startResize(e, handle.getAttribute('data-token')); return; }
        const th = e.target.closest('th');
        if (th) startHeaderDrag(e, th.getAttribute('data-token'));
      });
    }

    init().catch(e => renderError('Failed to initialize: ' + e.message));
  </script>
</body>
</html>
